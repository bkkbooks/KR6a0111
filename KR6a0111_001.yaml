body:
  text: 西晉沙門法炬譯佛在舍衛國請諸比丘比丘即到佛告比丘比丘應唯然從佛聞佛便說是不聞者不聞者俱相類相聚相應相可多聞者多聞者俱相類相聚相應相可貪婬者貪婬者俱相類相聚相應相可不貪婬者不貪婬者俱相類相聚相應相可瞋恚者瞋恚者俱相類相聚相應相可不瞋恚者不瞋恚者俱相類相聚相應相可愚癡者愚癡者俱相類相聚相應相可慧者慧者俱相類相聚相應相可布施者布施者俱相類相聚相應相可慳貪者慳貪者俱相類相聚相應相可少欲者少欲者俱相類相聚相應相可多欲者多欲者俱相類相聚相應相可不持戒者不持戒者俱相類相聚相應相可持戒者持戒者俱相類相聚相應相可難給者難給者俱相類相聚相應相可易給者易給者俱相類相聚相應相可不知足者不知足者俱相類相聚相應相可知足者知足者俱相類相聚相應相可不自守者不自守者俱相類相聚相應相可自守者自守者俱相類相聚相應相可佛說比丘如是慧人當分別是因緣可行者行之不可行者莫行佛說如是比丘受行著意
